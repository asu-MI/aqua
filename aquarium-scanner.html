<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>みんなの水族館 - スキャン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ocean-deep:#031f33; --ocean-mid:#0a4d68; --ocean-light:#1c8aa8;
    --bio:#6be8e0; --coral:#ff8f6b; --coral-deep:#e56a4a;
    --foam:#eafcff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{ margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:linear-gradient(180deg,#0d5f82 0%, #0a4d68 45%, #031f33 100%);
    font-family:'Zen Kaku Gothic New', sans-serif; touch-action:none; }
  .screen{ position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom)); }
  .hidden{ display:none !important; }

  .header{ position:fixed; top:max(16px, env(safe-area-inset-top)); left:0; right:0;
    display:flex; flex-direction:column; align-items:center; gap:4px; z-index:5; }
  .header .title{ font-family:'M PLUS Rounded 1c', sans-serif; font-weight:900; font-size:19px;
    color:var(--foam); text-shadow:0 0 14px rgba(107,232,224,0.5); }
  .header .session{ font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--bio); opacity:0.75; letter-spacing:0.1em; }

  .icon-circle{ width:96px; height:96px; border-radius:50%;
    background:rgba(107,232,224,0.12); border:1px solid rgba(107,232,224,0.35);
    display:flex; align-items:center; justify-content:center; margin-bottom:22px; }
  .icon-circle svg{ width:44px; height:44px; color:var(--bio); }

  .headline{ font-family:'M PLUS Rounded 1c', sans-serif; font-weight:700; font-size:20px;
    color:var(--foam); text-align:center; margin-bottom:10px; }
  .subline{ font-size:14px; color:var(--foam); opacity:0.75; text-align:center; margin-bottom:34px; max-width:280px; line-height:1.7; }

  .primary-btn{
    display:flex; align-items:center; gap:10px; justify-content:center;
    background:linear-gradient(180deg, var(--coral), var(--coral-deep));
    color:#fff8f2; border:none; border-radius:999px; padding:18px 32px;
    font-family:'M PLUS Rounded 1c', sans-serif; font-weight:700; font-size:17px;
    box-shadow:0 10px 24px rgba(229,106,74,0.45), 0 0 0 1px rgba(255,255,255,0.15) inset;
    width:min(320px, 80vw);
  }
  .primary-btn:active{ transform:scale(0.96); }
  .primary-btn svg{ width:22px; height:22px; flex-shrink:0; }

  .secondary-btn{
    margin-top:14px; background:transparent; border:1px solid rgba(234,252,255,0.35);
    color:var(--foam); border-radius:999px; padding:13px 26px;
    font-family:'Zen Kaku Gothic New', sans-serif; font-weight:500; font-size:14px;
    width:min(320px, 80vw);
  }
  .secondary-btn:active{ opacity:0.7; }

  /* preview */
  .preview-card{
    background:rgba(255,255,255,0.06); border:1px solid rgba(107,232,224,0.3);
    border-radius:20px; padding:20px; display:flex; flex-direction:column; align-items:center;
    backdrop-filter:blur(6px);
  }
  .preview-stage{
    width:min(260px, 60vw); height:min(260px, 60vw); border-radius:14px;
    background:
      linear-gradient(135deg, rgba(107,232,224,0.08), transparent 60%),
      repeating-conic-gradient(rgba(255,255,255,0.03) 0% 25%, transparent 0% 50%) 0 0/24px 24px,
      rgba(3,31,51,0.5);
    display:flex; align-items:center; justify-content:center; overflow:hidden; margin-bottom:18px;
  }
  .preview-stage canvas{ max-width:88%; max-height:88%; filter:drop-shadow(0 0 12px rgba(107,232,224,0.5)); }
  .preview-label{ font-size:13px; color:var(--foam); opacity:0.75; margin-bottom:16px; }

  /* overlay (processing / sending) */
  .overlay{
    position:fixed; inset:0; z-index:30; background:rgba(2,17,28,0.78);
    backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:18px; opacity:0; pointer-events:none; transition:opacity 0.3s ease;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .overlay-text{ color:var(--foam); font-family:'M PLUS Rounded 1c', sans-serif; font-weight:700; font-size:16px; text-align:center; width:80%; }
  .bubble-loader{ display:flex; gap:10px; }
  .bubble-loader span{ width:12px; height:12px; border-radius:50%; background:var(--bio);
    box-shadow:0 0 10px var(--bio); animation:bob 1s infinite ease-in-out; }
  .bubble-loader span:nth-child(2){ animation-delay:0.15s; }
  .bubble-loader span:nth-child(3){ animation-delay:0.3s; }
  @keyframes bob{ 0%,80%,100%{ transform:translateY(0); opacity:0.5;} 40%{ transform:translateY(-14px); opacity:1;} }

  .success-check{ width:64px; height:64px; border-radius:50%; background:rgba(92,226,122,0.15);
    border:1px solid rgba(92,226,122,0.5); display:flex; align-items:center; justify-content:center; }
  .success-check svg{ width:32px; height:32px; color:#5ce27a; }

  .toast{
    position:fixed; left:50%; bottom:40px; transform:translateX(-50%) translateY(20px);
    background:rgba(3,31,51,0.92); color:var(--foam); border:1px solid rgba(255,143,107,0.5);
    padding:13px 18px; border-radius:10px; font-size:14px; z-index:40; max-width:85%;
    text-align:center; opacity:0; transition:all 0.3s ease; pointer-events:none;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="title">みんなの水族館</div>
  <div class="session" id="sessionLabel">SESSION ----</div>
</div>

<!-- 起動画面：QRなしで開かれた場合 -->
<div class="screen" id="screenNoParams">
  <div class="icon-circle">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><line x1="14" y1="14" x2="21" y2="14"/><line x1="14" y1="21" x2="21" y2="21"/><line x1="17" y1="14" x2="17" y2="21"/></svg>
  </div>
  <div class="headline">QRコードから開いてください</div>
  <div class="subline">大きな画面に表示されているQRコードをこのiPadのカメラで読み取ると、参加ページが開きます。</div>
</div>

<!-- ホーム画面：スキャン待機 -->
<div class="screen hidden" id="screenHome">
  <div class="icon-circle">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
  </div>
  <div class="headline">描いた生き物をスキャンしよう</div>
  <div class="subline">白い紙に濃いペンで生き物を描いたら、点線のわくだけが写るように撮影してください。説明文などが写り込まないよう、少し余白を残して枠を狙うのがコツです。</div>
  <button class="primary-btn" id="scanBtn" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    カメラを起動する
  </button>
</div>

<!-- プレビュー画面：抽出結果の確認 -->
<div class="screen hidden" id="screenPreview">
  <div class="preview-card">
    <div class="preview-stage"><canvas id="previewCanvas"></canvas></div>
    <div class="preview-label">この生き物を放流しますか？</div>
    <button class="primary-btn" id="releaseBtn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16M14 6l6 6-6 6"/></svg>
      水槽に放流する
    </button>
    <button class="secondary-btn" id="retakeBtn" type="button">撮り直す</button>
  </div>
</div>

<!-- 完了画面 -->
<div class="screen hidden" id="screenDone">
  <div class="success-check">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div class="headline" style="margin-top:18px;">放流しました！</div>
  <div class="subline">大きな画面を見てみよう。続けてもう1匹スキャンできます。</div>
  <button class="primary-btn" id="againBtn" type="button">もう1匹スキャンする</button>
</div>

<input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none">

<div class="overlay" id="overlay">
  <div class="bubble-loader"><span></span><span></span><span></span></div>
  <div class="overlay-text" id="overlayText">生き物を抽出中...</div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  // ---------- URL params ----------
  var params = new URLSearchParams(window.location.search);
  var DB_URL = params.get('db') ? decodeURIComponent(params.get('db')) : null;
  var SESSION = params.get('s');

  function show(id){
    ['screenNoParams','screenHome','screenPreview','screenDone'].forEach(function(s){
      document.getElementById(s).classList.toggle('hidden', s!==id);
    });
  }

  if(!DB_URL || !SESSION){
    show('screenNoParams');
    return;
  }
  document.getElementById('sessionLabel').textContent = 'SESSION ' + SESSION;
  show('screenHome');

  // ---------- Utility ----------
  function rand(a,b){ return a+Math.random()*(b-a); }
  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
  function smoothstep(e0,e1,x){ var t=clamp((x-e0)/(e1-e0),0,1); return t*t*(3-2*t); }

  var toastEl = document.getElementById('toast');
  var toastTimer = null;
  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove('show'); }, 2800);
  }
  var overlayEl = document.getElementById('overlay');
  var overlayTextEl = document.getElementById('overlayText');
  function showOverlay(text){ overlayTextEl.textContent = text; overlayEl.classList.add('show'); }
  function hideOverlay(){ overlayEl.classList.remove('show'); }

  // ---------- Extraction (同じアルゴリズムを表示画面と共有せず、こちらで完結) ----------
  function extractCreature(img, cb){
    var maxDim = 640;
    var scale = Math.min(1, maxDim/Math.max(img.width, img.height));
    var w = Math.max(1, Math.round(img.width*scale));
    var h = Math.max(1, Math.round(img.height*scale));
    var work = document.createElement('canvas');
    work.width = w; work.height = h;
    var wctx = work.getContext('2d');
    wctx.drawImage(img, 0, 0, w, h);

    var imgData;
    try{ imgData = wctx.getImageData(0,0,w,h); } catch(e){ cb(null); return; }
    var data = imgData.data;

    var margin = Math.max(2, Math.round(Math.min(w,h)*0.03));
    var borderR=[], borderG=[], borderB=[];
    for(var y=0;y<h;y++){
      for(var x=0;x<w;x++){
        var onBorder = x<margin||y<margin||x>=w-margin||y>=h-margin;
        if(!onBorder) continue;
        var idx=(y*w+x)*4;
        borderR.push(data[idx]); borderG.push(data[idx+1]); borderB.push(data[idx+2]);
      }
    }
    function median(arr){
      if(!arr.length) return 255;
      arr.sort(function(a,b){ return a-b; });
      return arr[Math.floor(arr.length/2)];
    }
    // 平均ではなく中央値を使うことで、縁に紙以外のもの（他の紙や机など）が
    // 写り込んでいても背景色の推定が崩れにくくなる
    var bgR = median(borderR), bgG = median(borderG), bgB = median(borderB);

    var alphaMask = new Float32Array(w*h);
    var maxDist = Math.sqrt(3*255*255);
    var lowT=0.10, highT=0.28;

    for(var yy=0;yy<h;yy++){
      for(var xx=0;xx<w;xx++){
        var i2=(yy*w+xx)*4;
        var dr=data[i2]-bgR, dg=data[i2+1]-bgG, db=data[i2+2]-bgB;
        var dist = Math.sqrt(dr*dr+dg*dg+db*db)/maxDist;
        alphaMask[yy*w+xx] = smoothstep(lowT,highT,dist);
      }
    }

    // ---------------------------------------------------------------
    // 写真には目的の絵以外（用紙の外側、他の紙、机、影など）も写り込みやすいため、
    // 単純に「検出された全ピクセルの外接矩形」を取ると、離れた場所のノイズに
    // 引っ張られて絵とは無関係な範囲まで切り抜いてしまうことがある。
    // そこで、まず粗いグリッドで「まとまり（クラスター）」を作り、
    // 一番大きいまとまり（＝目的の絵）だけを採用する。
    // 眉やヒレのように輪郭から少し離れて描かれるパーツも同じまとまりに
    // 含められるよう、グリッド上で軽く膨張させてから連結成分を取る。
    // ---------------------------------------------------------------
    var CELL = 4;
    var cw = Math.ceil(w/CELL), ch = Math.ceil(h/CELL);
    var coarse = new Uint8Array(cw*ch);
    // 写真の外周（他の紙・机・印刷文字などが写り込みやすい）は候補から除外し、
    // 中央付近だけを対象にする
    var TRIM = 0.12;
    var trimX0 = Math.round(w*TRIM), trimX1 = Math.round(w*(1-TRIM));
    var trimY0 = Math.round(h*TRIM), trimY1 = Math.round(h*(1-TRIM));
    for(var y2=0;y2<h;y2++){
      if(y2<trimY0 || y2>=trimY1) continue;
      for(var x2=0;x2<w;x2++){
        if(x2<trimX0 || x2>=trimX1) continue;
        if(alphaMask[y2*w+x2] > 0.35){
          coarse[((y2/CELL)|0)*cw + ((x2/CELL)|0)] = 1;
        }
      }
    }
    var DILR = 2; // 粗いグリッド上で2セル分（≒画像の3〜4%程度）膨張させ、近接パーツを統合
    for(var iter=0; iter<DILR; iter++){
      var next = coarse.slice();
      for(var cy=0;cy<ch;cy++){
        for(var cx=0;cx<cw;cx++){
          var cidx = cy*cw+cx;
          if(coarse[cidx]) continue;
          var found=false;
          for(var dy=-1;dy<=1 && !found;dy++){
            for(var dx=-1;dx<=1 && !found;dx++){
              if(dx===0&&dy===0) continue;
              var nx=cx+dx, ny=cy+dy;
              if(nx<0||ny<0||nx>=cw||ny>=ch) continue;
              if(coarse[ny*cw+nx]) found=true;
            }
          }
          if(found) next[cidx]=1;
        }
      }
      coarse = next;
    }
    var labels = new Int32Array(cw*ch).fill(-1);
    var curLabel=0, stack=[];
    var compSize=[], compSumX=[], compSumY=[];
    for(var ci=0; ci<cw*ch; ci++){
      if(coarse[ci]===1 && labels[ci]===-1){
        var size=0, sumX=0, sumY=0;
        stack.length=0; stack.push(ci); labels[ci]=curLabel;
        while(stack.length){
          var cur = stack.pop(); size++;
          var ccx = cur % cw, ccy = (cur/cw)|0;
          sumX += ccx; sumY += ccy;
          for(var dy2=-1;dy2<=1;dy2++){
            for(var dx2=-1;dx2<=1;dx2++){
              if(dx2===0&&dy2===0) continue;
              var nnx=ccx+dx2, nny=ccy+dy2;
              if(nnx<0||nny<0||nnx>=cw||nny>=ch) continue;
              var nidx=nny*cw+nnx;
              if(coarse[nidx]===1 && labels[nidx]===-1){ labels[nidx]=curLabel; stack.push(nidx); }
            }
          }
        }
        compSize[curLabel]=size; compSumX[curLabel]=sumX; compSumY[curLabel]=sumY;
        curLabel++;
      }
    }
    if(curLabel===0){ cb(null); return; }

    // 「一番大きいまとまり」ではなく「大きさ×中心に近いか」でスコアリングする。
    // これにより、印刷された説明文のように大きいが端に寄っているまとまりより、
    // 写真の中央付近にある（＝ユーザーが意図して撮った）絵を優先できる
    var centerCx = cw/2, centerCy = ch/2;
    var normDist = Math.sqrt(cw*cw+ch*ch)/2;
    var bestLabel=-1, bestScore=-1;
    for(var lab=0; lab<curLabel; lab++){
      var s = compSize[lab];
      if(s < 3) continue;
      var mx = compSumX[lab]/s, my = compSumY[lab]/s;
      var d = Math.sqrt((mx-centerCx)*(mx-centerCx)+(my-centerCy)*(my-centerCy))/normDist;
      var score = s * Math.exp(-2.5*d);
      if(score > bestScore){ bestScore = score; bestLabel = lab; }
    }
    if(bestLabel===-1){ cb(null); return; }

    var cminX=cw,cminY=ch,cmaxX=0,cmaxY=0;
    for(var cj=0;cj<cw*ch;cj++){
      if(labels[cj]===bestLabel){
        var jx=cj%cw, jy=(cj/cw)|0;
        if(jx<cminX)cminX=jx; if(jx>cmaxX)cmaxX=jx;
        if(jy<cminY)cminY=jy; if(jy>cmaxY)cmaxY=jy;
      }
    }
    var regionMinX = Math.max(0, cminX*CELL - CELL);
    var regionMinY = Math.max(0, cminY*CELL - CELL);
    var regionMaxX = Math.min(w-1, (cmaxX+1)*CELL + CELL);
    var regionMaxY = Math.min(h-1, (cmaxY+1)*CELL + CELL);

    // 上で絞り込んだ領域の中だけで、あらためて正確な外接矩形を求める
    var minX=w,minY=h,maxX=0,maxY=0,foundCount=0;
    for(var y3=regionMinY;y3<=regionMaxY;y3++){
      for(var x3=regionMinX;x3<=regionMaxX;x3++){
        if(alphaMask[y3*w+x3] > 0.35){
          foundCount++;
          if(x3<minX)minX=x3; if(x3>maxX)maxX=x3;
          if(y3<minY)minY=y3; if(y3>maxY)maxY=y3;
        }
      }
    }
    if(foundCount<60 || maxX<=minX || maxY<=minY){ cb(null); return; }

    var pad = Math.round(Math.max(maxX-minX,maxY-minY)*0.06)+2;
    minX=Math.max(0,minX-pad); minY=Math.max(0,minY-pad);
    maxX=Math.min(w-1,maxX+pad); maxY=Math.min(h-1,maxY+pad);
    var cw=maxX-minX+1, ch=maxY-minY+1;
    if(cw<6||ch<6){ cb(null); return; }

    var out = document.createElement('canvas');
    out.width=cw; out.height=ch;
    var octx = out.getContext('2d');
    var outData = octx.createImageData(cw,ch);
    var od = outData.data;
    for(var oy=0;oy<ch;oy++){
      for(var ox=0;ox<cw;ox++){
        var sx=minX+ox, sy=minY+oy;
        var srcIdx=(sy*w+sx)*4, dstIdx=(oy*cw+ox)*4;
        var aRaw = clamp(alphaMask[sy*w+sx],0,1);
        var a2 = aRaw < 0.15 ? 0 : aRaw; // ごく弱いアルファは思い切って切り捨て、色ノイズの元を断つ
        if(a2 === 0){
          od[dstIdx]=0; od[dstIdx+1]=0; od[dstIdx+2]=0; od[dstIdx+3]=0;
          continue;
        }
        var aSafe = Math.max(a2, 0.30); // 増幅しすぎないよう下限を高めに設定
        // 半透明の縁ピクセルは背景色とブレンドされているので、背景成分を差し引いて元の色を推定する
        var rr = (data[srcIdx]   - (1-aSafe)*bgR) / aSafe;
        var gg = (data[srcIdx+1] - (1-aSafe)*bgG) / aSafe;
        var bb = (data[srcIdx+2] - (1-aSafe)*bgB) / aSafe;
        od[dstIdx]   = Math.round(clamp(rr,0,255));
        od[dstIdx+1] = Math.round(clamp(gg,0,255));
        od[dstIdx+2] = Math.round(clamp(bb,0,255));
        od[dstIdx+3] = Math.round(a2*255);
      }
    }
    octx.putImageData(outData,0,0);
    cb({ canvas: out, w: cw, h: ch });
  }

  // ---------- State ----------
  var currentSprite = null; // {canvas, w, h}

  function renderPreview(sprite){
    var cv = document.getElementById('previewCanvas');
    var maxSide = 240;
    var scale = Math.min(1, maxSide/Math.max(sprite.w, sprite.h));
    cv.width = Math.round(sprite.w*scale);
    cv.height = Math.round(sprite.h*scale);
    var pctx = cv.getContext('2d');
    pctx.imageSmoothingEnabled = true;
    pctx.drawImage(sprite.canvas, 0, 0, cv.width, cv.height);
  }

  function toUploadDataURL(sprite, cb){
    // アップロード用にさらに縮小して転送量を抑える
    var maxSide = 260;
    var scale = Math.min(1, maxSide/Math.max(sprite.w, sprite.h));
    var uw = Math.max(1, Math.round(sprite.w*scale));
    var uh = Math.max(1, Math.round(sprite.h*scale));
    var uc = document.createElement('canvas');
    uc.width = uw; uc.height = uh;
    var uctx = uc.getContext('2d');
    uctx.drawImage(sprite.canvas, 0, 0, uw, uh);
    cb(uc.toDataURL('image/png'), uw, uh);
  }

  // ---------- Camera flow ----------
  var scanBtn = document.getElementById('scanBtn');
  var fileInput = document.getElementById('fileInput');
  var retakeBtn = document.getElementById('retakeBtn');
  var releaseBtn = document.getElementById('releaseBtn');
  var againBtn = document.getElementById('againBtn');

  scanBtn.addEventListener('click', function(){
    fileInput.value = '';
    fileInput.click();
  });
  retakeBtn.addEventListener('click', function(){
    currentSprite = null;
    show('screenHome');
  });
  againBtn.addEventListener('click', function(){
    show('screenHome');
  });

  fileInput.addEventListener('change', function(e){
    var file = e.target.files && e.target.files[0];
    if(!file) return;
    showOverlay('生き物を抽出中...');
    var reader = new FileReader();
    reader.onload = function(ev){
      var img = new Image();
      img.onload = function(){
        setTimeout(function(){
          extractCreature(img, function(result){
            hideOverlay();
            if(!result){
              showToast('生き物が見つかりませんでした。濃い線で、はっきり描いてみてください。');
              show('screenHome');
              return;
            }
            currentSprite = result;
            renderPreview(result);
            show('screenPreview');
          });
        }, 30);
      };
      img.onerror = function(){
        hideOverlay();
        showToast('画像の読み込みに失敗しました。もう一度お試しください。');
      };
      img.src = ev.target.result;
    };
    reader.onerror = function(){
      hideOverlay();
      showToast('画像の読み込みに失敗しました。もう一度お試しください。');
    };
    reader.readAsDataURL(file);
  });

  releaseBtn.addEventListener('click', function(){
    if(!currentSprite) return;
    showOverlay('放流しています...');
    toUploadDataURL(currentSprite, function(dataUrl, w, h){
      var base = DB_URL.replace(/\/$/,'');
      var url = base + '/aquariums/' + SESSION + '/fish.json';
      fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ img: dataUrl, w: w, h: h, ts: Date.now() })
      }).then(function(res){
        hideOverlay();
        if(!res.ok) throw new Error('upload failed: ' + res.status);
        currentSprite = null;
        show('screenDone');
      }).catch(function(err){
        hideOverlay();
        showToast('送信に失敗しました。通信環境を確認してもう一度お試しください。');
      });
    });
  });

})();
</script>
</body>
</html>
