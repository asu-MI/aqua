<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>みんなの水族館 - 表示画面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ocean-deep:#031f33; --ocean-mid:#0a4d68; --ocean-light:#1c8aa8;
    --bio:#6be8e0; --coral:#ff8f6b; --coral-deep:#e56a4a;
    --sand:#e8c88a; --foam:#eafcff;
  }
  *{box-sizing:border-box;}
  html,body{ margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:var(--ocean-deep); font-family:'Zen Kaku Gothic New', sans-serif; }
  #tank{ position:fixed; inset:0; width:100%; height:100%; display:block; }
  .hud{ position:fixed; inset:0; pointer-events:none; z-index:10;
    display:flex; flex-direction:column; justify-content:space-between; padding:22px; }
  .top-row{ display:flex; justify-content:space-between; align-items:flex-start; }
  .specimen-tag{ font-family:'JetBrains Mono', monospace; font-size:14px; letter-spacing:0.12em;
    color:var(--bio); background:rgba(3,31,51,0.45); border:1px solid rgba(107,232,224,0.35);
    padding:10px 14px; border-radius:6px; backdrop-filter:blur(6px);
    text-shadow:0 0 8px rgba(107,232,224,0.6); }
  .specimen-tag .count{ font-size:18px; font-weight:500; color:var(--foam); }
  .title{ font-family:'M PLUS Rounded 1c', sans-serif; font-weight:900;
    font-size:clamp(24px,3vw,40px); color:var(--foam);
    text-shadow:0 0 22px rgba(107,232,224,0.55), 0 2px 8px rgba(0,0,0,0.4);
    letter-spacing:0.04em; text-align:right; }
  .prompt{ position:absolute; left:50%; top:44%; transform:translate(-50%,-50%);
    text-align:center; color:var(--foam); opacity:0.9;
    font-family:'M PLUS Rounded 1c', sans-serif; font-weight:700;
    font-size:clamp(20px,3vw,30px); text-shadow:0 2px 12px rgba(0,0,0,0.45);
    transition:opacity 0.8s ease; pointer-events:none; width:80%; }
  .prompt small{ display:block; margin-top:12px; font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:400; font-size:0.5em; opacity:0.85; }
  .bottom-row{ display:flex; justify-content:flex-start; align-items:flex-end; }
  .join-card{
    pointer-events:auto;
    display:flex; align-items:center; gap:16px;
    background:rgba(3,31,51,0.65); border:1px solid rgba(107,232,224,0.35);
    border-radius:16px; padding:14px 20px; backdrop-filter:blur(8px);
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
  }
  .join-card canvas{ background:#fff; border-radius:8px; padding:6px; display:block; }
  .join-text{ color:var(--foam); }
  .join-text .label{ font-family:'M PLUS Rounded 1c', sans-serif; font-weight:700; font-size:15px; }
  .join-text .code{ font-family:'JetBrains Mono', monospace; font-size:22px; letter-spacing:0.1em;
    color:var(--bio); text-shadow:0 0 10px rgba(107,232,224,0.6); margin-top:2px; }
  .join-text .sub{ font-size:11px; opacity:0.7; margin-top:4px; max-width:220px; }
  .status-dot{ width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:6px;
    background:#5ce27a; box-shadow:0 0 6px #5ce27a; }
  .status-dot.off{ background:#ff6b6b; box-shadow:0 0 6px #ff6b6b; }

  .reset-btn{
    position:fixed; right:18px; bottom:18px; z-index:15; pointer-events:auto;
    width:34px; height:34px; border-radius:50%; border:1px solid rgba(234,252,255,0.25);
    background:rgba(3,31,51,0.35); color:rgba(234,252,255,0.45);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    opacity:0.35; transition:opacity 0.2s ease, background 0.2s ease;
  }
  .reset-btn:hover{ opacity:0.9; background:rgba(3,31,51,0.7); color:var(--foam); }
  .reset-btn svg{ width:16px; height:16px; }

  .modal-backdrop{
    position:fixed; inset:0; z-index:50; background:rgba(2,17,28,0.75);
    backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity 0.2s ease;
  }
  .modal-backdrop.show{ opacity:1; pointer-events:auto; }
  .modal-card{
    background:rgba(8,38,54,0.95); border:1px solid rgba(107,232,224,0.35);
    border-radius:16px; padding:26px 28px; max-width:340px; text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
  }
  .modal-card p{ color:var(--foam); font-family:'M PLUS Rounded 1c', sans-serif;
    font-weight:700; font-size:15px; line-height:1.7; margin:0 0 20px; }
  .modal-actions{ display:flex; gap:10px; justify-content:center; }
  .modal-actions button{
    font-family:'Zen Kaku Gothic New', sans-serif; font-weight:500; font-size:14px;
    border-radius:999px; padding:10px 20px; border:none; cursor:pointer;
  }
  .modal-cancel{ background:rgba(255,255,255,0.1); color:var(--foam); }
  .modal-confirm{ background:linear-gradient(180deg, var(--coral), var(--coral-deep)); color:#fff8f2; }
</style>
</head>
<body>

<canvas id="tank"></canvas>

<div class="hud">
  <div class="top-row">
    <div class="specimen-tag">SPECIMEN No. <span class="count" id="specimenCount">000</span></div>
    <div class="title">みんなの水族館</div>
  </div>
  <div class="bottom-row">
    <div class="join-card">
      <canvas id="qrCanvas"></canvas>
      <div class="join-text">
        <div class="label"><span class="status-dot" id="statusDot"></span>スキャンして参加</div>
        <div class="code" id="sessionCode">----</div>
        <div class="sub">iPadで参加用ページを開き、描いた絵を撮影すると、ここに泳ぎ出します</div>
      </div>
    </div>
  </div>
</div>

<div class="prompt" id="prompt">
  まだ生き物がいません
  <small>左下のQRコードをiPadで読み取って参加しよう</small>
</div>

<button class="reset-btn" id="resetBtn" type="button" title="水槽をリセット">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
</button>

<div class="modal-backdrop" id="resetModal">
  <div class="modal-card">
    <p>水槽をリセットしますか？<br>すべての生き物が消えます</p>
    <div class="modal-actions">
      <button class="modal-cancel" id="resetCancel" type="button">キャンセル</button>
      <button class="modal-confirm" id="resetConfirm" type="button">リセットする</button>
    </div>
  </div>
</div>

<script>
//---------------------------------------------------------------------
//
// QR Code Generator for JavaScript
//
// Copyright (c) 2009 Kazuhiko Arase
//
// URL: http://www.d-project.com/
//
// Licensed under the MIT license:
//  http://www.opensource.org/licenses/mit-license.php
//
// The word 'QR Code' is registered trademark of
// DENSO WAVE INCORPORATED
//  http://www.denso-wave.com/qrcode/faqpatent-e.html
//
//---------------------------------------------------------------------

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {
          qrHtml += '<td style="';
          qrHtml += ' border-width: 0px; border-style: none;';
          qrHtml += ' border-collapse: collapse;';
          qrHtml += ' padding: 0px; margin: 0px;';
          qrHtml += ' width: ' + cellSize + 'px;';
          qrHtml += ' height: ' + cellSize + 'px;';
          qrHtml += ' background-color: ';
          qrHtml += _this.isDark(r, c)? '#000000' : '#ffffff';
          qrHtml += ';';
          qrHtml += '"/>';
        }

        qrHtml += '</tr>';
      }

      qrHtml += '</tbody>';
      qrHtml += '</table>';

      return qrHtml;
    };

    _this.createSvgTag = function(cellSize, margin, alt, title) {

      var opts = {};
      if (typeof arguments[0] == 'object') {
        // Called by options.
        opts = arguments[0];
        // overwrite cellSize and margin.
        cellSize = opts.cellSize;
        margin = opts.margin;
        alt = opts.alt;
        title = opts.title;
      }

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      // Compose alt property surrogate
      alt = (typeof alt === 'string') ? {text: alt} : alt || {};
      alt.text = alt.text || null;
      alt.id = (alt.text) ? alt.id || 'qrcode-description' : null;

      // Compose title property surrogate
      title = (typeof title === 'string') ? {text: title} : title || {};
      title.text = title.text || null;
      title.id = (title.text) ? title.id || 'qrcode-title' : null;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var c, mc, r, mr, qrSvg='', rect;

      rect = 'l' + cellSize + ',0 0,' + cellSize +
        ' -' + cellSize + ',0 0,-' + cellSize + 'z ';

      qrSvg += '<svg version="1.1" xmlns="http://www.w3.org/2000/svg"';
      qrSvg += !opts.scalable ? ' width="' + size + 'px" height="' + size + 'px"' : '';
      qrSvg += ' viewBox="0 0 ' + size + ' ' + size + '" ';
      qrSvg += ' preserveAspectRatio="xMinYMin meet"';
      qrSvg += (title.text || alt.text) ? ' role="img" aria-labelledby="' +
          escapeXml([title.id, alt.id].join(' ').trim() ) + '"' : '';
      qrSvg += '>';
      qrSvg += (title.text) ? '<title id="' + escapeXml(title.id) + '">' +
          escapeXml(title.text) + '</title>' : '';
      qrSvg += (alt.text) ? '<description id="' + escapeXml(alt.id) + '">' +
          escapeXml(alt.text) + '</description>' : '';
      qrSvg += '<rect width="100%" height="100%" fill="white" cx="0" cy="0"/>';
      qrSvg += '<path d="';

      for (r = 0; r < _this.getModuleCount(); r += 1) {
        mr = r * cellSize + margin;
        for (c = 0; c < _this.getModuleCount(); c += 1) {
          if (_this.isDark(r, c) ) {
            mc = c*cellSize+margin;
            qrSvg += 'M' + mc + ',' + mr + rect;
          }
        }
      }

      qrSvg += '" stroke="transparent" fill="black"/>';
      qrSvg += '</svg>';

      return qrSvg;
    };

    _this.createDataURL = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      return createDataURL(size, size, function(x, y) {
        if (min <= x && x < max && min <= y && y < max) {
          var c = Math.floor( (x - min) / cellSize);
          var r = Math.floor( (y - min) / cellSize);
          return _this.isDark(r, c)? 0 : 1;
        } else {
          return 1;
        }
      } );
    };

    _this.createImgTag = function(cellSize, margin, alt) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;

      var img = '';
      img += '<img';

    grad.addColorStop(0,'#0d5f82'); grad.addColorStop(0.45,'#0a4d68'); grad.addColorStop(1,'#031f33');
    ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
  }
  function drawCaustics(){
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    var bands = 5;
    for(var i=0;i<bands;i++){
      var yBase = H*(0.08+i*0.19) + Math.sin(time*0.25+i*1.7)*18;
      var alpha = 0.05 + 0.02*Math.sin(time*0.4+i);
      ctx.beginPath(); ctx.moveTo(-40,yBase);
      for(var x=-40;x<=W+40;x+=40){
        var y = yBase + Math.sin(x*0.015+time*0.6+i*1.3)*22 + Math.sin(x*0.05-time*0.9+i)*8;
        ctx.lineTo(x,y);
      }
      ctx.lineTo(W+40,yBase+400); ctx.lineTo(-40,yBase+400); ctx.closePath();
      ctx.fillStyle = 'rgba(180,240,255,'+alpha.toFixed(3)+')'; ctx.fill();
    }
    ctx.restore();
  }
  var seaweed = [];
  (function initSeaweed(){
    var n=7;
    for(var i=0;i<n;i++){
      seaweed.push({ xRatio:(i+0.5)/n+rand(-0.03,0.03), h:rand(70,150), w:rand(10,18),
        phase:rand(0,Math.PI*2), speed:rand(0.5,0.9), hue:rand(150,175) });
    }
  })();
  function drawSeaweed(){
    seaweed.forEach(function(sw){
      var x = sw.xRatio*W, baseY = H;
      ctx.beginPath(); ctx.moveTo(x-sw.w*0.5, baseY);
      var segs=10, pts=[];
      for(var s=0;s<=segs;s++){
        var t=s/segs;
        var sway = Math.sin(time*sw.speed+sw.phase+t*2.2)*(10*t*t);
        pts.push({x:x+sway, y:baseY-sw.h*t});
      }
      for(var s2=0;s2<pts.length;s2++) ctx.lineTo(pts[s2].x+sw.w*0.5*(1-s2/segs), pts[s2].y);
      for(var s3=pts.length-1;s3>=0;s3--) ctx.lineTo(pts[s3].x-sw.w*0.5*(1-s3/segs), pts[s3].y);
      ctx.closePath();
      ctx.fillStyle = 'hsla('+sw.hue+',55%,28%,0.75)'; ctx.fill();
    });
  }

  // サンゴ（高校生の目にも賑やかに映るよう、ビタミンカラーで）
  var corals = [];
  (function initCoral(){
    var palette = ['#ff8f6b','#ff6f9f','#c77dff','#ffb84d','#5ce1c8'];
    var n = 9;
    for(var i=0;i<n;i++){
      corals.push({
        xRatio: rand(0.02,0.98),
        scale: rand(0.6,1.3),
        color: palette[i % palette.length],
        phase: rand(0,Math.PI*2),
        speed: rand(0.3,0.6),
        branches: 3 + Math.floor(rand(0,3))
      });
    }
  })();
  function drawCoral(){
    corals.forEach(function(c){
      var x = c.xRatio*W;
      var baseY = H - Math.max(20,H*0.035);
      var sway = Math.sin(time*c.speed+c.phase)*3*c.scale;
      ctx.save();
      ctx.translate(x+sway, baseY);
      ctx.scale(c.scale, c.scale);
      ctx.fillStyle = c.color;
      ctx.globalAlpha = 0.88;
      for(var b=0; b<c.branches; b++){
        var ang = -Math.PI/2 + (b-(c.branches-1)/2)*0.32;
        var len = 26 + b%2*10;
        var bx = Math.cos(ang)*len, by = Math.sin(ang)*len;
        ctx.beginPath();
        ctx.moveTo(0,4);
        ctx.quadraticCurveTo(bx*0.5, by*0.5, bx, by);
        ctx.lineWidth = 9 - b*0.8;
        ctx.strokeStyle = c.color;
        ctx.lineCap = 'round';
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(bx, by, 5.5, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    });
  }

  // ヒトデ（砂地の彩り）
  var starfish = [];
  (function initStarfish(){
    var n = 4;
    for(var i=0;i<n;i++){
      starfish.push({
        xRatio: (i+0.5)/n + rand(-0.05,0.05),
        rot: rand(0,Math.PI*2),
        scale: rand(0.7,1.1),
        color: (i%2===0) ? '#ff8f6b' : '#ffb84d'
      });
    }
  })();
  function drawStar(cx, cy, r, rot, color){
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(rot);
    ctx.beginPath();
    for(var i=0;i<5;i++){
      var outer = i*(Math.PI*2/5) - Math.PI/2;
      var inner = outer + Math.PI/5;
      var ox = Math.cos(outer)*r, oy = Math.sin(outer)*r*0.55+r*0.45;
      var ix = Math.cos(inner)*r*0.42, iy = Math.sin(inner)*r*0.42*0.55+r*0.45;
      if(i===0) ctx.moveTo(ox,oy); else ctx.lineTo(ox,oy);
      ctx.lineTo(ix,iy);
    }
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.9;
    ctx.fill();
    ctx.restore();
  }
  function drawStarfish(){
    starfish.forEach(function(s){
      var x = s.xRatio*W;
      var y = H - Math.max(10,H*0.018);
      drawStar(x, y, 13*s.scale, s.rot, s.color);
    });
  }

  // 遠景の魚影（本物の来場者の生き物を引き立てる背景の賑わい。装飾専用でクリックできない）
  var bgFish = [];
  (function initBgFish(){
    var n = 10;
    for(var i=0;i<n;i++){
      bgFish.push({
        x: rand(0,W), y: rand(H*0.1,H*0.8),
        w: rand(14,26), speed: rand(10,22),
        dir: Math.random()<0.5?1:-1,
        bob: rand(0,Math.PI*2), bobAmp: rand(4,10), bobFreq: rand(0.5,1)
      });
    }
  })();
  function updateBgFish(dt){
    bgFish.forEach(function(f){
      f.x += f.speed*f.dir*dt;
      if(f.x > W+30 && f.dir===1) f.x = -30;
      if(f.x < -30 && f.dir===-1) f.x = W+30;
    });
  }
  function drawBgFish(){
    ctx.save();
    ctx.globalAlpha = 0.16;
    ctx.fillStyle = '#04283f';
    bgFish.forEach(function(f){
      var y = f.y + Math.sin(time*f.bobFreq+f.bob)*f.bobAmp;
      ctx.save();
      ctx.translate(f.x, y);
      ctx.scale(f.dir,1);
      ctx.beginPath();
      ctx.ellipse(0,0, f.w*0.5, f.w*0.28, 0, 0, Math.PI*2);
      ctx.moveTo(f.w*0.4, 0);
      ctx.lineTo(f.w*0.75, -f.w*0.22);
      ctx.lineTo(f.w*0.75, f.w*0.22);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    });
    ctx.restore();
  }

  function drawSand(){
    var sandH = Math.max(28,H*0.05);
    var grad = ctx.createLinearGradient(0,H-sandH,0,H);
    grad.addColorStop(0,'rgba(232,200,138,0.0)');
    grad.addColorStop(0.3,'rgba(196,163,104,0.55)');
    grad.addColorStop(1,'rgba(150,120,74,0.85)');
    ctx.fillStyle = grad; ctx.fillRect(0,H-sandH,W,sandH);
  }
  var bubbles = [];
  function spawnBubble(x,y){
    bubbles.push({ x:x!==undefined?x:rand(0,W), y:y!==undefined?y:H+rand(0,40),
      r:rand(2,6), speed:rand(18,42), wobble:rand(0,Math.PI*2), wobbleSpeed:rand(1,2.4),
      life:0, maxLife:rand(6,11) });
  }
  for(var bi=0;bi<22;bi++) spawnBubble(undefined, rand(0,H));
  function updateBubbles(dt){
    for(var i=bubbles.length-1;i>=0;i--){
      var b=bubbles[i]; b.y-=b.speed*dt; b.wobble+=b.wobbleSpeed*dt; b.life+=dt;
      if(b.y<-20||b.life>b.maxLife){ bubbles.splice(i,1); spawnBubble(undefined,H+rand(0,30)); }
    }
  }
  function drawBubbles(){

      ctx.fillStyle='rgba(220,250,255,0.35)'; ctx.fill();

  function spawnBurst(x,y){
    for(var i=0;i<14;i++){
      bubbles.push({ x:x+rand(-6,6), y:y+rand(-6,6), r:rand(2,5), speed:rand(50,110),

  // =====================================================================
  // Fish
  // =====================================================================
  var fishes = [];
  function Fish(el, w0, h0, isSeed, faceLeft, fixedBoxW, fixedBoxH){
    var boxW = fixedBoxW || rand(W*0.05, W*0.10);
    var boxH = fixedBoxH || rand(H*0.09, H*0.16);
    var ratio = w0/h0;
    var scale = Math.min(boxW/w0, boxH/h0);
    this.w = w0*scale; this.h = h0*scale;
    this.sprite = el;
    this.faceLeft = !!faceLeft; // true: 元絵は左向き / false: 元絵は右向き想定
    this.dir = Math.random()<0.5? 1 : -1;
    this.x = this.dir===1? -this.w : W+this.w;
    this.y = rand(H*0.08, H*0.86);
    this.baseY = this.y;
    this.targetBaseY = this.y;
    this.speed = rand(28,55);
    this.phase = rand(0,Math.PI*2);
    this.bobAmp = rand(10,22); this.bobFreq = rand(0.6,1.1);
    this.depth = rand(0,1); this.scaleMul = 1-this.depth*0.35;
    this.spawnTime = time; this.turnCooldown = rand(4,9);
    this.glowPhase = rand(0,Math.PI*2);
    this.removing = false; this.removeStart = null;
    this.isSeed = !!isSeed;
  }
  Fish.prototype.update = function(dt){
    this.x += this.speed*this.dir*dt;
    this.turnCooldown -= dt;
    if(this.turnCooldown<=0){ this.targetBaseY = clamp(this.baseY+rand(-110,110), H*0.08, H*0.86); this.turnCooldown = rand(5,10); }
    this.baseY += (this.targetBaseY - this.baseY) * Math.min(1, dt*0.6); // 徐々に目標の深さへ寄せる（急なジャンプを防ぐ）
    if(this.x > W+this.w*1.2 && this.dir===1) this.dir=-1;
    if(this.x < -this.w*1.2 && this.dir===-1) this.dir=1;
    this.y = this.baseY + Math.sin(time*this.bobFreq+this.phase)*this.bobAmp;
  };
  Fish.prototype.draw = function(ctx){
    var age = time-this.spawnTime;
    var growIn = smoothstep(0,0.7,age);
    var w = this.w*this.scaleMul*growIn, h = this.h*this.scaleMul*growIn;
    if(w<1||h<1) return;
    var dy = Math.cos(time*this.bobFreq+this.phase)*this.bobFreq*this.bobAmp;
    var tilt = clamp(dy*0.01,-0.25,0.25);
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(tilt*this.dir);
    var flip = (this.faceLeft? -1 : 1) * this.dir;
    ctx.scale(flip*this.scaleMul*growIn, this.scaleMul*growIn);
    var depthAlpha = 1-this.depth*0.45;
    if(this.removing){
      var fadeT = clamp((time-this.removeStart)/FADE_DURATION, 0, 1);
      depthAlpha *= (1-fadeT);
    }
    var glow = 0.5+0.5*Math.sin(time*1.3+this.glowPhase);
    ctx.globalAlpha = depthAlpha;
    ctx.shadowColor = 'rgba(107,232,224,'+(0.35+glow*0.35).toFixed(2)+')';
    ctx.shadowBlur = 14+glow*10;
    ctx.drawImage(this.sprite, -this.w/2, -this.h/2, this.w, this.h);
    if(this.depth>0.15){
      ctx.globalCompositeOperation = 'source-atop';
      ctx.globalAlpha = this.depth*0.35;
      ctx.fillStyle = '#0a4d68';
      ctx.fillRect(-this.w/2,-this.h/2,this.w,this.h);
    }
    ctx.restore();
  };
  var MAX_FISH = 40;       // 同時に泳がせる最大数（最初から泳いでいる resident 種は含めない）
  var FADE_DURATION = 1.6; // 退場フェードにかける秒数

  function addFish(el, w0, h0){
    var f = new Fish(el, w0, h0, false);
    fishes.push(f); // spawn order を保つ（描画順は毎フレーム別途ソートする）
    bumpSpecimen();
    hidePrompt();
    spawnBurst(f.dir===1? 10 : W-10, f.y);

    var activeCount = fishes.filter(function(x){ return !x.removing && !x.isSeed; }).length;
    if(activeCount > MAX_FISH){
      var oldest = null;
      for(var i=0;i<fishes.length;i++){
        if(!fishes[i].removing && !fishes[i].isSeed){ oldest = fishes[i]; break; }
      }
      if(oldest){ oldest.removing = true; oldest.removeStart = time; }
    }
  }

  var SEED_BOX_H = 0;

    fishes.push(f);
    hidePrompt();
  }

  function spawnSeedFish(){
    SEED_BOX_W = W*0.075;
    SEED_BOX_H = H*0.125;
    var slot = 0;
    SEED_FISH.forEach(function(item){
      var n = item.count || 1;
      for(var k=0;k<n;k++){
        (function(delayIndex){
          setTimeout(function(){
            var img = new Image();
            img.onload = function(){
              // 群れの中でも少しだけ大きさに個体差をつける
              var jitter = rand(0.85, 1.15);
              seedFish(img, item.w, item.h, jitter);
            };
            img.src = item.data;
          }, delayIndex * 320);
        })(slot);
        slot++;
      }
    });
  }
  spawnSeedFish();

  function resetAquarium(){
    fishes = [];
    specimenCount = 0;
    specimenEl.textContent = '000';
    promptEl.style.opacity = '1';
    seenKeys = {};
  }

  var lastT = performance.now();
  function frame(now){
    var dt = Math.min(0.05, (now-lastT)/1000);
    lastT = now; time += dt;
    drawBackground(); drawCaustics();
    updateBgFish(dt); drawBgFish();
    drawSeaweed(); drawCoral(); drawStarfish();
    updateBubbles(dt); drawBubbles();

    fishes.forEach(function(f){ f.update(dt); });
    var drawList = fishes.slice().sort(function(a,b){ return b.depth-a.depth; });
    drawList.forEach(function(f){ f.draw(ctx); });
    fishes = fishes.filter(function(f){
      return !(f.removing && (time-f.removeStart) > FADE_DURATION);
    });

    drawSand();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // =====================================================================
  // Firebase Realtime Database ストリーミング（SDK不要・REST + EventSource）
  // =====================================================================
  var statusDot = document.getElementById('statusDot');
  var seenKeys = {};

  function ingestFishData(key, data){
    if(!data || seenKeys[key]) return;
    seenKeys[key] = true;
    if(!data.img) return;
    var img = new Image();
    img.onload = function(){
      addFish(img, data.w || img.width, data.h || img.height);
    };
    img.src = data.img;
  }

  function handleStreamEvent(payload){
    if(!payload) return;
    var path = payload.path, data = payload.data;
    if(path === '/'){
      if(data){
        Object.keys(data).forEach(function(k){ ingestFishData(k, data[k]); });
      }
    } else {
      var key = path.replace(/^\//,'').split('/')[0];
      if(key) ingestFishData(key, data);
    }
  }

  function connectStream(){
    var base = FIREBASE_DB_URL.replace(/\/$/,'');
    var streamUrl = base + '/aquariums/' + sessionId + '/fish.json';
    var es = new EventSource(streamUrl);
    es.addEventListener('put', function(e){
      try{ handleStreamEvent(JSON.parse(e.data)); }catch(err){}
      statusDot.classList.remove('off');
    });
    es.addEventListener('patch', function(e){
      try{ handleStreamEvent(JSON.parse(e.data)); }catch(err){}
      statusDot.classList.remove('off');
    });
    es.onerror = function(){
      statusDot.classList.add('off');
      // EventSource auto-reconnects; nothing else to do here.
    };
  }
  connectStream();

  // =====================================================================
  // リセットボタン
  // =====================================================================
  var resetBtn = document.getElementById('resetBtn');
  var resetModal = document.getElementById('resetModal');
  var resetCancel = document.getElementById('resetCancel');
  var resetConfirm = document.getElementById('resetConfirm');

  resetBtn.addEventListener('click', function(){ resetModal.classList.add('show'); });
  resetCancel.addEventListener('click', function(){ resetModal.classList.remove('show'); });
  resetModal.addEventListener('click', function(e){ if(e.target === resetModal) resetModal.classList.remove('show'); });

  resetConfirm.addEventListener('click', function(){
    resetModal.classList.remove('show');
    var base = FIREBASE_DB_URL.replace(/\/$/,'');
    var url = base + '/aquariums/' + sessionId + '/fish.json';
    fetch(url, { method: 'DELETE' }).catch(function(err){ /* ローカルのリセットは実行する */ });
    resetAquarium();
  });

})();
</script>
